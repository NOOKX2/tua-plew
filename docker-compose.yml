name: fit-to-go

services:
  app:
    build: .
    container_name: fit-to-go-app
    ports:
      - "3000:3000"
    env_file:
      - path: .env.local
        required: false
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      HOSTNAME: "0.0.0.0"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
    command: ["bun", "run", "dev", "--", "-H", "0.0.0.0", "-p", "3000"]
    restart: unless-stopped

volumes:
  app_node_modules:
  app_next:
