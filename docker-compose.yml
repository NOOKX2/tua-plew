name: fit-to-go

services:
  app:
    build: .
    container_name: fit-to-go-app
    ports:
      - "3000:3000"
    env_file:
      - path: .env.local
        required: true
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      HOSTNAME: "0.0.0.0"
      # Set SEED_ON_START=1 to re-seed catalog on container start
      SEED_ON_START: "0"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    command: ["sh", "/app/docker-entrypoint.sh"]
    restart: unless-stopped

volumes:
  app_node_modules:
